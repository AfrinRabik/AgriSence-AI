<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Crop Recommendation - Register</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body class="auth-background">
    <div class="auth-container">
        <div class="auth-box register-box">
            <div class="auth-logo">
                <h1>🌾 Farmer Portal</h1>
                <p>Join our farming community</p>
            </div>
            
            <form id="registerForm" class="auth-form">
                <h2>Create Your Account</h2>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="farmerName">👨‍🌾 Full Name</label>
                        <input 
                            type="text" 
                            id="farmerName" 
                            name="farmerName" 
                            placeholder="Enter your full name" 
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="age">🎂 Age</label>
                        <input 
                            type="number" 
                            id="age" 
                            name="age" 
                            placeholder="Age (min 18)" 
                            min="18" 
                            max="120"
                            required
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label for="registerEmail">📧 Email Address</label>
                    <input 
                        type="email" 
                        id="registerEmail" 
                        name="registerEmail" 
                        placeholder="Enter your email" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="registerPassword">🔐 Password</label>
                    <input 
                        type="password" 
                        id="registerPassword" 
                        name="registerPassword" 
                        placeholder="Create a password (min 8 characters)" 
                        minlength="8"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="confirmPassword">✅ Confirm Password</label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        name="confirmPassword" 
                        placeholder="Confirm your password" 
                        required
                    >
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                    <span>📝 Create Account</span>
                </button>

                <div class="auth-links">
                    <a href="index.html" class="link-primary">Already have an account? Login</a>
                </div>
            </form>

            <div id="message" class="message"></div>
        </div>
    </div>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/auth.js"></script>
</body>
</html>
