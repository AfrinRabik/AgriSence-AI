<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Crop Recommendation - Forgot Password</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body class="auth-background">
    <div class="auth-container">
        <div class="auth-box forgot-box">
            <div class="auth-logo">
                <h1>🌾 Farmer Portal</h1>
                <p>Reset your password</p>
            </div>
            
            <!-- Step 1: Email Entry -->
            <div id="stepOne" class="forgot-step">
                <form id="forgotPasswordForm" class="auth-form">
                    <h2>Reset Password</h2>
                    <p class="step-description">Enter your registered email to receive an OTP</p>
                    
                    <div class="form-group">
                        <label for="forgotEmail">📧 Email Address</label>
                        <input 
                            type="email" 
                            id="forgotEmail" 
                            name="forgotEmail" 
                            placeholder="Enter your registered email" 
                            required
                        >
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">
                        <span>📨 Send OTP</span>
                    </button>

                    <div class="auth-links">
                        <a href="index.html" class="link-primary">Back to Login</a>
                    </div>
                </form>
            </div>

            <!-- Step 2: OTP Verification -->
            <div id="stepTwo" class="forgot-step" style="display: none;">
                <form id="otpVerificationForm" class="auth-form">
                    <h2>Verify OTP</h2>
                    <p class="step-description">Enter the OTP sent to your email</p>
                    
                    <div class="form-group">
                        <p class="email-display" id="emailDisplay"></p>
                    </div>

                    <div class="form-group">
                        <label for="otp">🔑 Enter OTP</label>
                        <input 
                            type="text" 
                            id="otp" 
                            name="otp" 
                            placeholder="Enter 6-digit OTP" 
                            maxlength="6"
                            required
                        >
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">
                        <span>✅ Verify OTP</span>
                    </button>

                    <p class="step-description">
                        <a href="javascript:resendOTP()" id="resendBtn">Resend OTP</a> 
                        <span class="timer">(in <span id="timer">60</span>s)</span>
                    </p>
                </form>
            </div>

            <!-- Step 3: Reset Password -->
            <div id="stepThree" class="forgot-step" style="display: none;">
                <form id="resetPasswordForm" class="auth-form">
                    <h2>Create New Password</h2>
                    <p class="step-description">Enter your new password</p>
                    
                    <div class="form-group">
                        <label for="newPassword">🔐 New Password</label>
                        <input 
                            type="password" 
                            id="newPassword" 
                            name="newPassword" 
                            placeholder="Create a new password (min 8 characters)" 
                            minlength="8"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="confirmNewPassword">✅ Confirm Password</label>
                        <input 
                            type="password" 
                            id="confirmNewPassword" 
                            name="confirmNewPassword" 
                            placeholder="Confirm your new password" 
                            required
                        >
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">
                        <span>🔄 Reset Password</span>
                    </button>

                    <div class="auth-links">
                        <a href="index.html" class="link-primary">Back to Login</a>
                    </div>
                </form>
            </div>

            <div id="message" class="message"></div>
        </div>
    </div>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/auth.js"></script>
</body>
</html>
